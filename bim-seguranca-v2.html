<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>BIM Segurança Eletrônica | Protector Sistemas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--azul:#1B4F72;--azul2:#2E86C1;--azulD:#154360;--laranja:#F39C12;--verde:#27AE60;--vermelho:#E74C3C;
--roxo:#8E44AD;--cinza:#5D6D7E;--cinzaL:#F8F9FA;--cinzaM:#E5E8EB;--branco:#FFF;
--sombra:0 2px 12px rgba(0,0,0,.08);--radius:10px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F0F2F5;color:#2C3E50;overflow:hidden;height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ===== LANDING ===== */
.landing{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d2137 0%,#1B4F72 40%,#2E86C1 100%)}
.landing-logo{color:rgba(255,255,255,.5);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.landing-title{color:#fff;font-size:38px;font-weight:800;margin-bottom:6px}
.landing-sub{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:48px}
.scenario-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:720px}
.scenario-card{width:160px;background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:20px 16px;cursor:pointer;transition:.25s;text-align:center;color:#fff}
.scenario-card:hover{background:rgba(255,255,255,.12);border-color:var(--laranja);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.scenario-card .sc-icon{font-size:32px;margin-bottom:10px}
.scenario-card h4{font-size:15px;margin-bottom:6px;font-weight:600}
.scenario-card p{font-size:12px;opacity:.5;line-height:1.4}
/* Client form */
.client-form{width:100%;max-width:680px;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:36px 40px;animation:portPopIn .2s ease-out;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.client-form .cf-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px}
.client-form .cf-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:28px}
.cf-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cf-grid.full{grid-template-columns:1fr}
.cf-field{display:flex;flex-direction:column;gap:5px}
.cf-field label{font-size:12px;color:rgba(255,255,255,.65);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.cf-field input,.cf-field select,.cf-field textarea{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:11px 14px;color:#fff;font-size:14px;outline:none;transition:.2s;font-family:inherit}
.cf-field input:focus,.cf-field select:focus,.cf-field textarea:focus{border-color:var(--laranja);background:rgba(255,255,255,.12)}
.cf-field input::placeholder{color:rgba(255,255,255,.3);font-size:13px}
.cf-field textarea{resize:vertical;min-height:60px}
.cf-field select option{background:#1B4F72;color:#fff}
.cf-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end}
.cf-btn{padding:12px 32px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
.cf-btn.primary{background:var(--laranja);color:#000}.cf-btn.primary:hover{background:#e5a817;transform:translateY(-1px)}
.cf-btn.secondary{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6)}.cf-btn.secondary:hover{border-color:rgba(255,255,255,.4);color:#fff}
.cf-section{font-size:12px;font-weight:700;color:var(--laranja);text-transform:uppercase;letter-spacing:1px;margin-top:20px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1)}

/* ===== APP SHELL ===== */
.app-shell{display:flex;flex-direction:column;height:100vh}
.app-topbar{height:54px;background:var(--azulD);color:#fff;display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.app-topbar .logo{font-size:14px;font-weight:700;letter-spacing:1px;opacity:.7}
.app-topbar .proj-name{font-size:16px;font-weight:600;flex:1}
.app-topbar .tb-btn{padding:8px 16px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.8);border-radius:6px;font-size:13px;cursor:pointer;transition:.15s;font-weight:600}
.app-topbar .tb-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.app-topbar .tb-btn.primary{background:var(--laranja);border-color:var(--laranja);color:#000;font-weight:700}

/* ===== TOOLBAR ===== */
.toolbar{height:44px;background:var(--branco);border-bottom:1px solid var(--cinzaM);display:flex;align-items:center;padding:0 14px;gap:6px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tool-group{display:flex;align-items:center;gap:3px;padding:0 8px;border-right:1px solid var(--cinzaM)}
.tool-group:last-child{border-right:none}
.tool-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:16px;color:var(--cinza);transition:.15s}
.tool-btn:hover{background:var(--cinzaL);color:var(--azul)}
.tool-btn.active{background:#EBF5FB;color:var(--azul2)}
.tool-sep{width:1px;height:26px;background:var(--cinzaM)}
.tool-label{font-size:12px;color:var(--cinza);padding:0 4px;font-weight:500}

/* Simulation toggle */
.sim-toggle{display:flex;align-items:center;gap:8px;margin-left:auto;padding:0 10px}
.sim-toggle label{font-size:12px;color:var(--cinza);font-weight:600}
.sim-pill{display:flex;background:var(--cinzaL);border-radius:5px;overflow:hidden;border:1px solid var(--cinzaM)}
.sim-pill button{padding:6px 14px;border:none;background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--cinza);transition:.15s}
.sim-pill button.active{background:var(--azul);color:#fff}

/* ===== MAIN AREA ===== */
.main-area{flex:1;display:flex;overflow:hidden}

/* ===== LEFT PANEL ===== */
.left-panel{width:260px;background:var(--branco);border-right:1px solid var(--cinzaM);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;box-shadow:2px 0 8px rgba(0,0,0,.04)}
.lp-tabs{display:flex;border-bottom:1px solid var(--cinzaM)}
.lp-tab{flex:1;padding:10px 6px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:var(--cinza);transition:.15s}
.lp-tab.active{color:var(--azul);border-color:var(--azul2)}
.lp-content{flex:1;overflow-y:auto;padding:10px}
.lp-search{width:100%;padding:9px 12px;border:1px solid var(--cinzaM);border-radius:6px;font-size:13px;margin-bottom:10px}
.lp-search:focus{outline:none;border-color:var(--azul2);box-shadow:0 0 0 2px rgba(46,134,193,.15)}
.dev-category{margin-bottom:12px}
.dev-cat-title{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--cinza);padding:5px 6px;font-weight:700;display:flex;align-items:center;gap:4px;cursor:pointer}
.dev-cat-title .cnt{font-size:11px;background:var(--cinzaL);padding:2px 6px;border-radius:8px}
.dev-item{display:flex;align-items:center;gap:10px;padding:9px 10px;margin:3px 0;border-radius:8px;cursor:grab;transition:.12s;font-size:13px;border:1px solid transparent}
.dev-item:hover{background:#F0F7FD;border-color:#D6EAF8;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.dev-item:active{cursor:grabbing;opacity:.7;transform:scale(.97)}
.dev-item .di-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dev-item .di-icon svg{width:100%;height:100%}
.dev-item .di-info{flex:1;min-width:0}
.dev-item .di-name{font-weight:600;color:var(--azul);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-item .di-spec{font-size:11px;color:var(--cinza);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-item .di-tag{font-size:10px;padding:3px 7px;border-radius:4px;font-weight:700;flex-shrink:0}
.tag-poe{background:#E8F8F0;color:var(--verde)}
.tag-dc{background:#FEF5E7;color:#E67E22}

/* ===== CANVAS AREA ===== */
.canvas-area{flex:1;position:relative;overflow:hidden;background:#fafbfc}
.canvas-viewport{position:absolute;inset:0;overflow:hidden}
.canvas-transform{transform-origin:0 0;position:absolute;top:0;left:0}
.canvas-grid{position:absolute;top:0;left:0;pointer-events:none}
.canvas-bg{position:absolute;top:0;left:0;pointer-events:none;opacity:.3}

/* Floor plan image */
.floor-image{position:absolute;top:0;left:0;pointer-events:none}

/* Device nodes on canvas */
.device-on-canvas{position:absolute;cursor:move;user-select:none;z-index:5;display:flex;flex-direction:column;align-items:center}
.device-on-canvas .doc-icon{width:52px;height:52px;background:var(--branco);border:2.5px solid var(--azul2);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.18);transition:.15s}
.device-on-canvas .doc-icon svg{width:28px;height:28px}
.device-on-canvas:hover .doc-icon{box-shadow:0 6px 20px rgba(0,0,0,.25);transform:scale(1.08)}
.device-on-canvas.selected .doc-icon{border-color:var(--laranja);box-shadow:0 0 0 5px rgba(243,156,18,.25)}
.device-on-canvas .doc-label{font-size:12px;font-weight:700;color:var(--azul);margin-top:3px;text-align:center;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(255,255,255,.95);padding:2px 7px;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1);text-shadow:0 0 1px rgba(0,0,0,.05)}
.device-on-canvas .doc-model{font-size:10px;color:var(--cinza);font-weight:500;text-shadow:0 0 1px rgba(0,0,0,.05)}

/* Connection port popup */
.port-popup-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:900;background:rgba(0,0,0,.15)}
.port-popup{position:absolute;z-index:910;display:flex;flex-direction:column;gap:4px;min-width:240px;
  background:var(--branco);border:1px solid var(--cinzaM);border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.22);
  padding:8px;animation:portPopIn .15s ease-out}
@keyframes portPopIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.port-popup .pp-title{font-size:13px;font-weight:700;color:var(--azul);padding:6px 10px;border-bottom:1px solid var(--cinzaM);margin-bottom:3px}
.port-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border:none;background:transparent;
  border-radius:8px;cursor:crosshair;transition:.12s;text-align:left;width:100%}
.port-btn:hover{background:#EBF5FB}
.port-btn .pb-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.port-btn .pb-dot.ch-data{background:#3b82f6}
.port-btn .pb-dot.ch-power-in{background:#ef4444}
.port-btn .pb-dot.ch-power-out{background:#22c55e}
.port-btn .pb-dot.ch-signal-in{background:#eab308}
.port-btn .pb-dot.ch-signal-out{background:#d97706}
.port-btn .pb-dot.ch-automation-in{background:#f97316}
.port-btn .pb-dot.ch-automation-out{background:#ea580c}
.port-btn .pb-dot.ch-passthrough{background:#8b5cf6}
.port-btn .pb-info{flex:1;min-width:0}
.port-btn .pb-label{font-size:13px;font-weight:600;color:var(--azulD);line-height:1.3}
.port-btn .pb-type{font-size:10px;color:var(--cinza);margin-top:2px}
.port-btn .pb-req{font-size:9px;color:var(--vermelho);font-weight:700}
.port-btn .pb-opt{font-size:9px;color:var(--cinza);font-style:italic}

/* Connection lines — draw.io style */
.conn-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:3}
.conn-line-path{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.conn-hit-area{fill:none;stroke:transparent;stroke-width:16;cursor:pointer;pointer-events:stroke}
.conn-g:hover .conn-line-path{stroke-opacity:.85;filter:brightness(1.2)}
.conn-selected .conn-line-path{filter:drop-shadow(0 0 3px rgba(59,130,246,.6))}
.cable-label{font-size:10px;fill:var(--cinza);text-anchor:middle;font-weight:600;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linecap:round;stroke-linejoin:round}
.seg-hit{fill:none;stroke:transparent;stroke-width:16;cursor:grab;pointer-events:stroke}
.seg-hit:hover~.seg-highlight{opacity:1}
.seg-highlight{opacity:0;fill:none;stroke:#3b82f6;stroke-width:3;stroke-dasharray:4 3;pointer-events:none;transition:opacity .12s}

/* Environments/rooms overlay */
.env-rect{position:absolute;border:2px dashed;border-radius:8px;z-index:1;pointer-events:none}
.env-label{position:absolute;top:-16px;left:8px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}

/* Canvas controls */
.canvas-controls{position:absolute;left:12px;bottom:12px;display:flex;flex-direction:column;gap:4px;z-index:20}
.canvas-controls button{width:38px;height:38px;background:var(--branco);border:1px solid var(--cinzaM);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--cinza);transition:.15s;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.canvas-controls button:hover{background:#EBF5FB;color:var(--azul);box-shadow:0 3px 10px rgba(0,0,0,.12)}
.scale-indicator{position:absolute;right:12px;bottom:12px;background:rgba(255,255,255,.95);padding:5px 12px;border-radius:5px;font-size:11px;color:var(--cinza);border:1px solid var(--cinzaM);z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* Toast animation */
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* Canvas hint */
.canvas-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--cinza);pointer-events:none;z-index:1}
.canvas-hint .ch-icon{font-size:56px;opacity:.3;margin-bottom:14px}
.canvas-hint p{font-size:15px;opacity:.5;font-weight:500}
.canvas-hint .ch-sub{font-size:12px;opacity:.3;margin-top:6px}

/* ===== RIGHT PANEL ===== */
.right-panel{width:340px;background:var(--branco);border-left:1px solid var(--cinzaM);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;box-shadow:-2px 0 8px rgba(0,0,0,.04)}
.rp-tabs{display:flex;border-bottom:1px solid var(--cinzaM)}
.rp-tab{flex:1;padding:10px 6px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:var(--cinza);transition:.15s}
.rp-tab.active{color:var(--azul);border-color:var(--azul2)}
.rp-content{flex:1;overflow-y:auto;padding:14px}

/* Device properties panel */
.prop-section{margin-bottom:14px}
.prop-header{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cinzaM);margin-bottom:10px}
.prop-header .ph-icon{width:42px;height:42px;background:#EBF5FB;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.prop-header .ph-info{flex:1}
.prop-header .ph-name{font-size:15px;font-weight:700;color:var(--azul)}
.prop-header .ph-model{font-size:12px;color:var(--cinza)}
.prop-header .ph-replace{font-size:12px;color:var(--azul2);cursor:pointer;font-weight:600}
.prop-header .ph-replace:hover{text-decoration:underline}
.prop-row{display:flex;align-items:center;padding:7px 0;font-size:13px}
.prop-row .pr-label{width:110px;color:var(--cinza);font-weight:500;flex-shrink:0}
.prop-row .pr-value{flex:1}
.prop-row input,.prop-row select{width:100%;padding:7px 10px;border:1px solid var(--cinzaM);border-radius:5px;font-size:13px}
.prop-row input:focus,.prop-row select:focus{outline:none;border-color:var(--azul2);box-shadow:0 0 0 2px rgba(46,134,193,.15)}
.prop-actions{display:flex;gap:8px;margin-top:10px}
.prop-actions button{flex:1;padding:9px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-apply{background:var(--verde);color:#fff}
.btn-apply:hover{background:#229954}
.btn-delete{background:transparent;border:1px solid var(--vermelho)!important;color:var(--vermelho)}
.btn-delete:hover{background:#FDEDEC}
.btn-copy{background:transparent;border:1px solid var(--azul2)!important;color:var(--azul2)}
.btn-copy:hover{background:#EBF5FB}

/* Topology view */
.topo-node{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:4px 0;background:var(--cinzaL);border-radius:8px;font-size:13px;border-left:4px solid var(--azul2);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.topo-node .tn-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.topo-node .tn-info{flex:1}
.topo-node .tn-name{font-weight:600;color:var(--azul);font-size:13px}
.topo-node .tn-detail{font-size:11px;color:var(--cinza)}
.topo-node .tn-ports{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px}
.ports-ok{background:#E8F8F0;color:var(--verde)}
.ports-warn{background:#FEF5E7;color:#E67E22}
.ports-full{background:#FDEDEC;color:var(--vermelho)}
.topo-children{padding-left:20px;border-left:2px solid var(--cinzaM);margin-left:20px}
.topo-disconnected{border-left-color:var(--vermelho);background:#FDEDEC}

/* Equipment List */
.eq-table{width:100%;border-collapse:collapse;font-size:13px}
.eq-table th{text-align:left;padding:8px 10px;background:var(--cinzaL);border-bottom:1px solid var(--cinzaM);font-weight:700;color:var(--cinza);position:sticky;top:0;font-size:12px}
.eq-table td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
.eq-table tr:hover{background:#FAFBFC}
.eq-table .eq-total{font-weight:700;color:var(--azul)}
.eq-footer{padding:12px 0;border-top:2px solid var(--cinzaM)}
.eq-footer .ef-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.eq-footer .ef-row.total{font-size:14px;font-weight:700;color:var(--azul);padding-top:8px;border-top:1px solid var(--cinzaM);margin-top:4px}
.eq-input{width:65px;padding:5px 7px;border:1px solid var(--cinzaM);border-radius:4px;font-size:13px;text-align:right}
.eq-input:focus{outline:none;border-color:var(--azul2);box-shadow:0 0 0 2px rgba(46,134,193,.15)}

/* Validation alerts */
.val-card{border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:4px solid;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.val-card.critica{background:#FDEDEC;border-color:var(--vermelho)}
.val-card.alta{background:#FEF5E7;border-color:#E67E22}
.val-card.media{background:#EBF5FB;border-color:var(--azul2)}
.val-card.obrigatoria{background:#F5EEF8;border-color:var(--roxo)}
.val-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}
.val-sev{font-size:10px;padding:3px 8px;border-radius:4px;color:#fff;font-weight:700}
.sev-critica{background:var(--vermelho)}
.sev-alta{background:#E67E22}
.sev-media{background:var(--azul2)}
.sev-obrigatoria{background:var(--roxo)}
.val-body{font-size:12px;color:var(--cinza);margin-top:4px;line-height:1.5}

/* Export dialog */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-card{background:#fff;border-radius:14px;padding:28px;max-width:520px;width:90%;box-shadow:0 12px 48px rgba(0,0,0,.25);max-height:80vh;overflow-y:auto}
.modal-card h3{font-size:16px;color:var(--azul);margin-bottom:12px}
.modal-card .mc-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.modal-card .mc-row label{flex:1;cursor:pointer}
.modal-card .mc-actions{display:flex;gap:8px;margin-top:16px}
.modal-card .mc-btn{flex:1;padding:10px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.mc-btn-primary{background:var(--azul);color:#fff}
.mc-btn-primary:hover{background:var(--azul2)}
.mc-btn-secondary{background:var(--cinzaL);color:var(--cinza);border:1px solid var(--cinzaM)!important}

/* Floor tabs */
.floor-tabs{display:flex;align-items:center;gap:3px;padding:0 10px;border-bottom:1px solid var(--cinzaM);background:var(--cinzaL);height:36px;flex-shrink:0}
.floor-tab{padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;border-radius:5px 5px 0 0;color:var(--cinza);transition:.12s;border:1px solid transparent;border-bottom:none}
.floor-tab.active{background:var(--branco);color:var(--azul);border-color:var(--cinzaM);box-shadow:0 -1px 4px rgba(0,0,0,.04)}
.floor-tab:hover{background:rgba(255,255,255,.5)}
.floor-add{padding:6px 10px;font-size:14px;cursor:pointer;color:var(--azul2);font-weight:700;border:none;background:transparent;border-radius:5px}
.floor-add:hover{background:rgba(46,134,193,.1)}

/* Environment badges */
.env-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;margin:2px;cursor:pointer;transition:.12s;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.env-badge:hover{filter:brightness(.9)}

/* Status bar */
.status-bar{height:30px;background:var(--cinzaL);border-top:1px solid var(--cinzaM);display:flex;align-items:center;padding:0 14px;gap:18px;font-size:12px;color:var(--cinza);flex-shrink:0}
.status-bar .sb-item{display:flex;align-items:center;gap:5px}
.sb-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.sb-ok{background:var(--verde)}
.sb-warn{background:var(--laranja)}
.sb-err{background:var(--vermelho)}

/* Keyboard shortcut hints */
.shortcut{font-size:9px;background:var(--cinzaL);padding:1px 4px;border-radius:2px;color:var(--cinza);border:1px solid var(--cinzaM);font-family:monospace}

/* ===== DASHBOARD ===== */
.dashboard-container{height:100vh;background:linear-gradient(135deg,#0d2137 0%,#1B4F72 40%,#2E86C1 100%);color:#fff;overflow-y:auto;padding:24px}
.dashboard-content{max-width:1400px;margin:0 auto}
.dashboard-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px}
.dh-left h1{font-size:30px;font-weight:800;margin-bottom:4px}
.dh-left p{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:16px}
.dh-version{font-size:12px;color:rgba(255,255,255,.4)}
.dh-user{display:flex;align-items:center;gap:12px}
.dh-avatar{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid rgba(255,255,255,.3)}

.dashboard-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:22px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.stat-number{font-size:34px;font-weight:800;color:var(--laranja);margin-bottom:8px}
.stat-label{font-size:13px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.5px;font-weight:600}

.dashboard-modules{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.module-card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:24px;cursor:pointer;transition:.3s;display:flex;flex-direction:column;align-items:flex-start;min-height:140px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.module-card:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.module-card.primary{border-color:var(--laranja);background:rgba(243,156,18,.12)}
.module-card.primary:hover{border-color:var(--laranja);background:rgba(243,156,18,.2);box-shadow:0 0 32px rgba(243,156,18,.2)}
.mc-icon{font-size:36px;margin-bottom:14px}
.mc-title{font-size:18px;font-weight:700;margin-bottom:6px}
.mc-desc{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:16px;flex:1;line-height:1.4}
.mc-badge{font-size:11px;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:6px;color:rgba(255,255,255,.75);margin-top:auto;font-weight:600}

.dashboard-list{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.dashboard-list h3{color:#fff;margin-bottom:16px;font-size:17px}
.list-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.2s}
.list-item:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.list-item-info h4{color:#fff;font-size:15px;font-weight:600;margin-bottom:3px}
.list-item-info p{font-size:13px;color:rgba(255,255,255,.55)}
.list-actions{display:flex;gap:8px}
.list-btn{padding:6px 14px;font-size:12px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:.2s;font-weight:600}
.list-btn:hover{border-color:rgba(255,255,255,.4);color:#fff}

.search-input{width:100%;padding:12px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:14px;margin-bottom:16px}
.search-input::placeholder{color:rgba(255,255,255,.35);font-size:13px}
.search-input:focus{outline:none;border-color:var(--laranja);background:rgba(255,255,255,.12)}

.modal-back-btn{padding:11px 24px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);border-radius:8px;font-size:14px;cursor:pointer;transition:.2s;margin-bottom:20px;align-self:flex-start;font-weight:600}
.modal-back-btn:hover{border-color:rgba(255,255,255,.4);color:#fff}

// Calculate recommended PP cable section based on distance (meters)
// Rules: 0-30m→0.5mm², 31-60m→1.0mm², 61-100m→1.5mm², >100m→2.5mm²
const calcPPSection = (distMeters, vias=2) => {
  let secao = 0.5;
  if(distMeters > 100) secao = 2.5;
  else if(distMeters > 60) secao = 1.5;
  else if(distMeters > 30) secao = 1.0;
  const secStr = secao.toFixed(1).replace('.',',');
  const id = `pp${vias}v_${String(secao*10).replace('.','').padStart(2,'0')}`;
  return { secao, id, label: `PP ${vias}×${secStr}mm²` };
};

// ====================================================================
// DEVICE KEY CLASSIFICATION HELPERS
// ====================================================================
const isCamera = k => k.startsWith('cam_');
const isCameraIP = k => k.startsWith('cam_ip_') || k === 'cam_lpr';
const isCameraMHD = k => k.startsWith('cam_mhd_') || k.startsWith('cam_hdcvi_');
const isCameraWiFi = k => k.startsWith('cam_wifi_');
const isCameraVeicular = k => k.startsWith('cam_veicular_');
const isNVR = k => k.startsWith('nvr_') || k === 'nvr';
const isDVR = k => k.startsWith('dvr_');
const isGravador = k => isNVR(k) || isDVR(k);
const isCentralAlarme = k => k.startsWith('alarme_');
const isSensorPIR = k => k.startsWith('pir_');
const isBarreira = k => k.startsWith('barreira_');
const isSensorZona = k => isSensorPIR(k) || isBarreira(k) || k === 'sensor_abertura';
const isSirene = k => k.startsWith('sirene_') && !k.startsWith('sirene_inc_');
const isEletrificador = k => k.startsWith('eletrif_');
const isTeclado = k => k.startsWith('teclado_');
const isSwitch = k => k.startsWith('sw_');
const isSwitchPoE = k => k === 'sw_poe' || k.startsWith('sw_poe_');
const isControleAcesso = k => ['leitor_facial','controladora','fechadura','leitor_tag'].includes(k) || k.startsWith('biometrico_') || k.startsWith('tag_uhf_') || k.startsWith('catraca_') || k.startsWith('torniquete_');
const isIncendio = k => k.startsWith('central_inc_') || k.startsWith('detector_') || k.startsWith('acionador_') || k.startsWith('modulo_inc_') || k.startsWith('sirene_inc_');
const isCentralIncendio = k => k.startsWith('central_inc_');
const isDetectorIncendio = k => k.startsWith('detector_') || k.startsWith('acionador_');
const isAutomatizador = k => k.startsWith('motor_') || k.startsWith('cancela_') || k === 'motor';
const isAP = k => k.startsWith('ap_');
const isLuminaria = k => k.startsWith('lumin_');
const isComunicador = k => k.startsWith('comunicador_');
const isExpansor = k => k.startsWith('expansor_') || k.startsWith('receptor_');
const isPerifericoAlarme = k => isTeclado(k) || isComunicador(k) || isExpansor(k) || k.startsWith('controle_');
const isNobreak = k => k === 'nobreak_ac' || k === 'nobreak_dc';
const isFonte = k => k === 'fonte';
const isInfra = k => ['rack','quadro','quadro_eletrico','dio','borne_sak','bateria_ext','modulo_bat','cabo_engate','tomada_dupla'].includes(k);
const needsPoE = k => isCameraIP(k) || isAP(k);
const needsNetwork = k => needsPoE(k) || isGravador(k) || isCentralAlarme(k) || k === 'controladora' || k === 'leitor_facial' || k === 'router' || isSwitch(k);
const needsACPower = k => isSwitch(k) || isGravador(k) || k === 'router' || isEletrificador(k) || isCentralIncendio(k) || isAutomatizador(k) || isNobreak(k) || isLuminaria(k) || k.startsWith('catraca_') || k.startsWith('torniquete_');
const needsDCPower = k => k === 'leitor_facial' || k === 'fechadura' || isSirene(k) || k === 'leitor_tag' || k.startsWith('biometrico_') || k.startsWith('tag_uhf_');

// ====================================================================
// NVR/SWITCH CAPACITY HELPERS
// ====================================================================
const getNvrChannels = (dev) => {
  if(dev.config?.channels) return dev.config.channels;
  const m = dev.key.match(/(\d+)ch/);
  if(m) return parseInt(m[1]);
  const c = dev.props?.canais;
  if(c){ const n=c.match(/(\d+)/); if(n) return parseInt(n[1]); }
  return 16;
};
const getSwitchPorts = (dev) => {
  if(dev.config?.portCount) return dev.config.portCount;
  const p = dev.props?.portas;
  if(p){ const n=p.match(/^(\d+)/); if(n) return parseInt(n[1]); }
  if(dev.key==='sw_poe') return 8;
  if(dev.key==='sw_normal') return 8;
  const m=dev.key.match(/(\d+)/);
  if(m) return parseInt(m[1]);
  return 8;
};
const getNvrUsedChannels = (nvrId, devs) => {
  return devs.filter(d=>isCamera(d.key))
    .reduce((sum,d)=>sum+(d.nvrAssignments?.find(a=>a.nvrId===nvrId)?.qty||0),0);
};
const getCameraUnassigned = (cam) => {
  const total=cam.qty||1;
  const assigned=(cam.nvrAssignments||[]).reduce((s,a)=>s+(a.qty||0),0);
  return total-assigned;
};
const autoAssignCameras = (devs, conns) => {
  const updates=[];
  const nvrs=devs.filter(d=>isGravador(d.key));
  const cameras=devs.filter(d=>isCamera(d.key));
  if(!nvrs.length||!cameras.length) return updates;
  // Build NVR capacity map
  const nvrCap={};
  nvrs.forEach(n=>{nvrCap[n.id]={dev:n,total:getNvrChannels(n),used:getNvrUsedChannels(n.id,devs)}});
  // For each camera, find reachable NVR(s) via shared switch or direct connection
  cameras.forEach(cam=>{
    const unassigned=getCameraUnassigned(cam);
    if(unassigned<=0) return;
    // Find directly connected devices
    const directConns=conns.filter(c=>c.from===cam.id||c.to===cam.id);
    const directIds=directConns.map(c=>c.from===cam.id?c.to:c.from);
    // Check if directly connected to NVR
    let reachableNvrs=directIds.filter(id=>nvrs.some(n=>n.id===id));
    // Check via switch
    const connSwitches=directIds.filter(id=>devs.find(d=>d.id===id&&isSwitch(d.key)));
    connSwitches.forEach(swId=>{
      const swConns=conns.filter(c=>c.from===swId||c.to===swId);
      swConns.forEach(c=>{
        const otherId=c.from===swId?c.to:c.from;
        if(nvrs.some(n=>n.id===otherId)&&!reachableNvrs.includes(otherId)){
          reachableNvrs.push(otherId);
        }
      });
    });
    if(!reachableNvrs.length) return;
    // Assign to reachable NVRs by available capacity
    let remaining=unassigned;
    const newAssignments=[...(cam.nvrAssignments||[])];
    reachableNvrs.forEach(nvrId=>{
      if(remaining<=0) return;
      const cap=nvrCap[nvrId];
      const available=cap.total-cap.used;
      if(available<=0) return;
      const assign=Math.min(remaining,available);
      const existing=newAssignments.find(a=>a.nvrId===nvrId);
      if(existing) existing.qty+=assign;
      else newAssignments.push({nvrId,qty:assign});
      cap.used+=assign;
      remaining-=assign;
    });
    // If still remaining and NVRs are full, assign overflow to first reachable NVR
    if(remaining>0 && reachableNvrs.length){
      const firstNvr=reachableNvrs[0];
      const existing=newAssignments.find(a=>a.nvrId===firstNvr);
      if(existing) existing.qty+=remaining;
      else newAssignments.push({nvrId:firstNvr,qty:remaining});
      nvrCap[firstNvr].used+=remaining;
    }
    if(JSON.stringify(newAssignments)!==JSON.stringify(cam.nvrAssignments||[])){
      updates.push({id:cam.id,nvrAssignments:newAssignments});
    }
  });
  return updates;
};

// Can this device be rack-mounted?
function canMountInRack(key){
  return isSwitch(key)||isGravador(key)||isNobreak(key)||isFonte(key)||
    key==='router'||key==='dio'||key==='borne_sak'||key==='bateria_ext'||
    key==='modulo_bat'||key==='controladora'||isCentralAlarme(key)||isCentralIncendio(key)||
    key==='fonte'||key==='cabo_engate';
}
// Can this device go inside a quadro conectividade?
function canMountInQuadro(key){
  return key==='nobreak_dc'||isFonte(key)||key==='borne_sak'||key==='dio'||
    isCentralAlarme(key)||key==='controladora'||needsDCPower(key);
}
// Can this device go inside a quadro elétrico?
function canMountInQuadroEletrico(key){
  return key==='nobreak_ac'||key==='nobreak_dc'||isFonte(key)||key==='dps_rede'||
    key==='tomada_dupla'||key==='borne_sak';
}

// Rack U size per device type
function getDeviceUSize(key){
  if(isGravador(key)) return 2; // NVR/DVR = 2U
  if(isSwitch(key)) return 1;
  if(key==='nobreak_ac') return 2;
  if(key==='nobreak_dc') return 1;
  if(key==='router') return 1;
  if(key==='dio') return 1;
  if(key==='borne_sak') return 1;
  if(key==='fonte') return 1;
  if(key==='bateria_ext') return 2;
  if(key==='modulo_bat') return 3;
  if(isCentralAlarme(key)) return 1;
  if(isCentralIncendio(key)) return 2;
  if(key==='controladora') return 1;
  return 1; // default 1U
}

// Pattern-based interface resolution for expanded device library
function resolveInterfacesByKey(key) {
  if (DEVICE_INTERFACES[key]) return DEVICE_INTERFACES[key];
  // Camera IP → PoE + 12V alt + sensor
  if (isCameraIP(key)) return DEVICE_INTERFACES.cam_dome;
  // Camera Multi HD / HDCVI → Coaxial + 12VDC
  if (isCameraMHD(key)) return [
    {type:'data_in',cables:['coaxial'],label:'Vídeo HD (BNC/Coaxial)',required:true},
    {type:'power_in',cables:['pp2v_10','pp2v_05'],label:'Alimentação 12VDC',required:true},
    {type:'signal_in',cables:['pp2v_05'],label:'Entrada sensor alarme (NA/NF)',required:false},
    {type:'signal_out',cables:['pp2v_05'],label:'Saída contato seco (relay)',required:false}];
  // Camera WiFi → WiFi + power
  if (isCameraWiFi(key)) return [
    {type:'power_in',cables:['pp2v_10','pp2v_05'],label:'Alimentação 12VDC/5VDC',required:true}];
  // Camera veicular → Network + 12V
  if (isCameraVeicular(key)) return [
    {type:'data_in',cables:['cat5e','cat6'],label:'Rede TCP/IP',required:true},
    {type:'power_in',cables:['pp2v_10'],label:'Alimentação 12VDC',required:true}];
  // NVR → same as nvr
  if (isNVR(key)) return DEVICE_INTERFACES.nvr;
  // DVR → Coaxial + AC + Network
  if (isDVR(key)) return [
    {type:'data_in',cables:['coaxial'],label:'Entradas vídeo (BNC)',required:true},
    {type:'data_in',cables:['cat5e','cat6'],label:'Rede TCP/IP',required:false},
    {type:'power_in',cables:['ac_power','pp_flex'],label:'Alimentação AC',required:true}];
  // Centrais alarme
  if (isCentralAlarme(key)) return DEVICE_INTERFACES.alarme_central;
  // Sensores PIR
  if (isSensorPIR(key)) return DEVICE_INTERFACES.sensor_presenca;
  // Barreiras IR
  if (isBarreira(key)) return [
    {type:'signal_out',cables:['pp2v_05'],label:'Saída zona (NA/NF)',required:true},
    {type:'power_in',cables:['pp2v_10','pp2v_05'],label:'Alimentação 12VDC',required:true}];
  // Eletrificadores
  if (isEletrificador(key)) return [
    {type:'power_in',cables:['ac_power','pp_flex'],label:'Alimentação AC 110/220V',required:true},
    {type:'signal_out',cables:['pp2v_05'],label:'Saída zona (tamper/disparo)',required:false},
    {type:'signal_in',cables:['pp2v_05'],label:'Entrada zona (sensor setor)',required:false}];
  // Teclados
  if (isTeclado(key)) return [
    {type:'data_in',cables:['pp4v_10','pp2v_05'],label:'Barramento central (4 fios)',required:true},
    {type:'power_in',cables:['pp2v_05'],label:'Alimentação via barramento',required:false}];
  // Sirenes
  if (isSirene(key)) return DEVICE_INTERFACES.sirene;
  // Controle acesso expandido
  if (key.startsWith('biometrico_') || key.startsWith('tag_uhf_')) return DEVICE_INTERFACES.leitor_tag;
  if (key.startsWith('catraca_') || key.startsWith('torniquete_')) return [
    {type:'power_in',cables:['ac_power','pp_flex'],label:'Alimentação AC 110/220V',required:true},
    {type:'data_in',cables:['cat5e','cat6'],label:'Rede TCP/IP',required:true},
    {type:'signal_in',cables:['pp2v_05'],label:'Botoeira/acionamento',required:false}];
  if (key.startsWith('cancela_')) return [
    {type:'power_in',cables:['ac_power','pp_flex'],label:'Alimentação AC',required:true},
    {type:'signal_in',cables:['pp2v_05'],label:'Sinal abertura (botoeira/controle)',required:false},
    {type:'data_in',cables:['cat5e','cat6'],label:'Rede TCP/IP (se IP)',required:false}];
  // Automatizadores
  if (isAutomatizador(key)) return DEVICE_INTERFACES.motor;
  // Incêndio - centrais
  if (isCentralIncendio(key)) return [
    {type:'power_in',cables:['ac_power','pp_flex'],label:'Alimentação AC 220V',required:true},
    {type:'signal_in',cables:['pp2v_05','pp4v_10'],label:'Laço de detecção (zonas)',required:true},
    {type:'data_in',cables:['cat5e','cat6'],label:'Rede TCP/IP (monitoramento)',required:false}];
  // Incêndio - detectores/acionadores
  if (isDetectorIncendio(key)) return [
    {type:'signal_out',cables:['pp2v_05'],label:'Laço 2 fios (zona central)',required:true}];
  // Incêndio - módulos
  if (key.startsWith('modulo_inc_')) return [
    {type:'signal_out',cables:['pp2v_05'],label:'Laço 2 fios (endereçável)',required:true},
    {type:'automation_out',cables:['pp2v_10','pp2v_05'],label:'Saída acionamento',required:false}];
  // Incêndio - sirenes
  if (key.startsWith('sirene_inc_')) return [
    {type:'signal_in',cables:['pp2v_05'],label:'Laço 2 fios (zona central)',required:true}];
  // AP WiFi
  if (isAP(key)) return [
    {type:'data_in',cables:['cat5e','cat6','cat6a'],label:'PoE Data+Power (RJ45)',required:true},
    {type:'power_in',cables:['pp2v_10','pp2v_15'],label:'Alimentação 12VDC (alternativa ao PoE)',required:false}];
  // Switch PoE expandidos
  if (isSwitchPoE(key)) return DEVICE_INTERFACES.sw_poe;
  // Iluminação emergência
  if (isLuminaria(key)) return [
    {type:'power_in',cables:['ac_power','pp_flex'],label:'Alimentação AC (rede elétrica)',required:true}];
  // Comunicadores
  if (isComunicador(key)) return [
    {type:'data_in',cables:['cat5e','cat6'],label:'Rede TCP/IP',required:false},
    {type:'signal_in',cables:['pp2v_05'],label:'Entrada da central',required:true},
    {type:'power_in',cables:['pp2v_10','pp2v_05'],label:'Alimentação 12VDC',required:true}];
  // Periféricos alarme (controle remoto, receptor, expansor)
  if (isExpansor(key)) return [
    {type:'data_in',cables:['pp4v_10','pp2v_05'],label:'Barramento central',required:true},
    {type:'signal_in',cables:['pp2v_05'],label:'Entrada zonas',required:false},
    {type:'power_in',cables:['pp2v_05'],label:'Alimentação via barramento',required:false}];
  if (key.startsWith('controle_')) return [
    {type:'signal_out',cables:['pp2v_05'],label:'Saída zona/acionamento',required:true}];
  return [];
}

// Validate if a connection between two device types with a given cable is valid
// Returns: {valid:bool, cable:suggestedCable, reason:string, purpose:string}
// Note: fromKey/toKey can be a string OR a device object. If device, uses getDeviceInterfaces.
const validateConnection = (fromKey, toKey, cableId) => {
  // Support both string keys and device objects
  let fromIfaces, toIfaces;

  if (typeof fromKey === 'object' && fromKey !== null) {
    fromIfaces = getDeviceInterfaces(fromKey);
    fromKey = fromKey.key;
  } else {
    fromIfaces = resolveInterfacesByKey(fromKey) || [];
  }
  if (typeof toKey === 'object' && toKey !== null) {
    toIfaces = getDeviceInterfaces(toKey);
    toKey = toKey.key;
  } else {
    toIfaces = resolveInterfacesByKey(toKey) || [];
  }

  // Collect all valid cable options between these two devices
  const validCombos = [];

  fromIfaces.forEach(fi => {
    toIfaces.forEach(ti => {
      // Check interface compatibility
      const compatible = (
        // data_io connects to anything data
        (fi.type === 'data_io' && (ti.type === 'data_in' || ti.type === 'data_io')) ||
        (ti.type === 'data_io' && (fi.type === 'data_in' || fi.type === 'data_io')) ||
        // power_out connects to power_in
        (fi.type === 'power_out' && ti.type === 'power_in') ||
        (ti.type === 'power_out' && fi.type === 'power_in') ||
        // signal_out connects to signal_in
        (fi.type === 'signal_out' && ti.type === 'signal_in') ||
        (ti.type === 'signal_out' && fi.type === 'signal_in') ||
        // automation_out connects to automation_in
        (fi.type === 'automation_out' && ti.type === 'automation_in') ||
        (ti.type === 'automation_out' && fi.type === 'automation_in') ||
        // passthrough connects to anything
        fi.type === 'passthrough' || ti.type === 'passthrough'
      );
      if (!compatible) return;

      // Check target restrictions (e.g., nobreak SNMP only connects to switches)
      if (fi.targets && !fi.targets.includes(toKey)) return;
      if (ti.targets && !ti.targets.includes(fromKey)) return;

      // Find common cables between the two interfaces
      if(!fi.cables?.length || !ti.cables?.length) return;
      const commonCables = fi.cables.filter(c => ti.cables.includes(c));
      if (commonCables.length === 0) return;

      const purpose = fi.type.includes('power') || ti.type.includes('power') ? 'energia' :
                      fi.type.includes('automation') || ti.type.includes('automation') ? 'automação' :
                      fi.type.includes('signal') || ti.type.includes('signal') ? 'sinal' : 'dados';

      commonCables.forEach(cab => {
        validCombos.push({ cable: cab, purpose, fromIface: fi, toIface: ti });
      });
    });
  });

  if (validCombos.length === 0) {
    return { valid: false, cables: [], reason: `Não há interface compatível entre ${fromKey} e ${toKey}`, purpose: null };
  }

  // If a specific cable was requested, check if it's in valid combos
  if (cableId) {
    const match = validCombos.find(vc => vc.cable === cableId);
    if (match) {
      return { valid: true, cables: [cableId], reason: `${match.purpose}: ${match.fromIface.label} ↔ ${match.toIface.label}`, purpose: match.purpose };
    }
    // Cable requested is invalid for this pair
    const suggestedCables = [...new Set(validCombos.map(vc => vc.cable))];
    const ct = CABLE_TYPES.find(c => c.id === cableId);
    return {
      valid: false,
      cables: suggestedCables,
      reason: `${ct?.name || cableId} não é válido para ${fromKey}↔${toKey}. Use: ${suggestedCables.map(c => CABLE_TYPES.find(t=>t.id===c)?.name).join(', ')}`,
      purpose: validCombos[0]?.purpose
    };
  }

  // No specific cable — return all valid options
  const suggestedCables = [...new Set(validCombos.map(vc => vc.cable))];
  return { valid: true, cables: suggestedCables, reason: validCombos.map(vc => `${vc.purpose}: ${vc.fromIface.label}↔${vc.toIface.label}`).join(' | '), purpose: validCombos[0]?.purpose };
};

// Get device interfaces dynamically based on config
const getDeviceInterfaces = (device) => {
  // For custom devices, use the base device type's interfaces
  const key = (typeof device === 'string') ? device : (device.key.startsWith('custom_') ? getDeviceIconKey(device.key) : device.key);
  if (typeof device === 'string') return resolveInterfacesByKey(key) || [];
  const base = [...(resolveInterfacesByKey(key) || [])];
  // For nobreak_ac, add SNMP interface only if config.snmp is true
  if (key === 'nobreak_ac' && device.config?.snmp) {
    base.push({type:'data_io',cables:['cat5e','cat6'],label:'SNMP (placa de rede)',required:false,
      targets:['sw_poe','sw_normal','router']});
  }
  // Append custom interfaces from custom devices (wizard step 4)
  if (device.customIfaces && Array.isArray(device.customIfaces)) {
    device.customIfaces.forEach(ci => {
      if (ci.label) base.push({type:ci.type||'signal_in', cables:ci.cables||[], label:ci.label, required:!!ci.required});
    });
  }
  return base;
};

// CSS class for interface type dot color
const getPortDotClass = (type) => {
  if (type === 'power_in') return 'ch-power-in';
  if (type === 'power_out') return 'ch-power-out';
  if (type === 'signal_in') return 'ch-signal-in';
  if (type === 'signal_out') return 'ch-signal-out';
  if (type === 'automation_in') return 'ch-automation-in';
  if (type === 'automation_out') return 'ch-automation-out';
  if (type === 'passthrough') return 'ch-passthrough';
  return 'ch-data';
};
// Human-readable type name
const getPortTypeName = (type) => {
  const map = {data_in:'Dados (entrada)',data_io:'Dados (bidirecional)',power_in:'Energia (entrada)',
    power_out:'Energia (saída)',signal_in:'Sinal (entrada)',signal_out:'Sinal (saída)',
    automation_in:'Automação (entrada)',automation_out:'Automação (saída)',passthrough:'Passagem'};
  return map[type]||type;
};

// Get the best default cable for a device pair
const getDefaultCable = (fromKey, toKey) => {
  const result = validateConnection(fromKey, toKey, null);
  if (!result.valid || result.cables.length === 0) return null;
  // Priority: prefer data cables for data devices, power for power devices
  const priority = ['cat6','cat6a','cat5e','smf','mmf','ac_power','pp_flex','pp2v_10','pp2v_15','pp2v_25','pp2v_05','pp4v_10','pp4v_15','pp4v_25','pp4v_05','coaxial','wireless','sb50_48v','sb50_12v'];
  return result.cables.sort((a,b) => priority.indexOf(a) - priority.indexOf(b))[0];
};

const REGRAS=[
  {cat:'Elétrica',regra:'Consumo PoE total vs capacidade do switch',sev:'CRÍTICA',
    check:(devices)=>{
      const sws=devices.filter(d=>isSwitchPoE(d.key));
      if(!sws.length) return null;
      const totalPoe=devices.filter(d=>{const def=findDevDef(d.key);return def?.poe}).reduce((a,d)=>{const def=findDevDef(d.key);return a+(def?.poeW||15)},0);
      const swCap=sws.reduce((a,d)=>{const def=findDevDef(d.key);return a+parseInt(def?.props?.poe_budget||'120')},0);
      if(totalPoe>swCap) return `Consumo PoE ${totalPoe}W > Capacidade ${swCap}W`;
      if(totalPoe>swCap*0.8) return `Consumo PoE ${totalPoe}W > 80% da capacidade (${swCap}W)`;
      return null;
    }},
  {cat:'Infraestrutura',regra:'Nobreak AC deve ter bateria externa ou módulo',sev:'OBRIGATÓRIA',
    check:(devices)=>{
      const nbAcs=devices.filter(d=>d.key==='nobreak_ac');
      if(!nbAcs.length) return null;
      const needsBat=nbAcs.filter(nb=>!nb.config?.batExterna);
      if(needsBat.length) return `${needsBat.length} Nobreak AC requer bateria externa configurada`;
      return null;
    }},
  {cat:'Rede',regra:'Portas: dispositivos + uplink + 20% reserva',sev:'ALTA',
    check:(devices)=>{
      const sws=devices.filter(d=>isSwitch(d.key));
      if(!sws.length) return null;
      const ports=sws.reduce((a,d)=>a+parseInt(findDevDef(d.key)?.props?.portas?.split('+')[0]||'8'),0);
      const needed=devices.filter(d=>{const def=findDevDef(d.key);return (def?.ports||0)>0}).length;
      const total=Math.ceil(needed*1.2)+sws.length;
      if(total>ports) return `${needed} dispositivos (+20%+uplinks) = ${total} portas necessárias > ${ports} disponíveis`;
      return null;
    }},
  {cat:'CFTV',regra:'Gravador: canais vs câmeras',sev:'CRÍTICA',
    check:(devices)=>{
      const cams=devices.filter(d=>isCamera(d.key)).length;
      const gravadores=devices.filter(d=>isGravador(d.key));
      if(!cams||!gravadores.length) return null;
      const ch=gravadores.reduce((a,d)=>a+parseInt(findDevDef(d.key)?.props?.canais||findDevDef(d.key)?.nvrCh||'16'),0);
      if(cams>ch) return `${cams} câmeras > ${ch} canais gravador(es)`;
      return null;
    }},
  {cat:'Acesso',regra:'Dispositivo IP de acesso precisa de switch/rede',sev:'ALTA',
    check:(devices)=>{
      const accessIP=devices.filter(d=>d.key==='leitor_facial'||d.key==='controladora'||d.key.startsWith('catraca_')||d.key.startsWith('torniquete_')).length;
      const sw=devices.filter(d=>isSwitch(d.key)).length;
      if(accessIP>0&&sw===0) return `${accessIP} dispositivo(s) de acesso IP sem switch de rede`;
      return null;
    }},
  {cat:'Infra',regra:'Nobreak obrigatório para sistemas críticos',sev:'ALTA',
    check:(devices)=>{
      const nb=devices.filter(d=>isNobreak(d.key)).length;
      const cams=devices.filter(d=>isCamera(d.key)).length;
      if(cams>0&&nb===0) return `${cams} câmeras sem nobreak = sem gravação no blackout`;
      return null;
    }},
  {cat:'Arquitetura',regra:'> 2 switches: avaliar rack',sev:'ALTA',
    check:(devices)=>{
      const sw=devices.filter(d=>isSwitch(d.key)).length;
      if(sw>2) return `${sw} switches. Considerar rack 5U+ em vez de quadro`;
      return null;
    }},
  {cat:'Energia',regra:'Dispositivos sem alimentação elétrica',sev:'CRÍTICA',
    check:(devices,connections)=>{
      const issues=[];
      devices.filter(d=>needsACPower(d.key)).forEach(dev=>{
        const hasPowerConn=connections?.some(c=>{
          const otherId=c.from===dev.id?c.to:c.from;
          const ct=CABLE_TYPES.find(t=>t.id===c.type);
          return ct?.group==='power';
        });
        if(!hasPowerConn) issues.push(dev.name);
      });
      if(issues.length>0) return `Sem cabo de energia: ${issues.slice(0,3).join(', ')}${issues.length>3?` +${issues.length-3}`:''}`;
      return null;
    }},
  {cat:'Alimentação',regra:'Dispositivo DC sem fonte 12V',sev:'ALTA',
    check:(devices,connections)=>{
      const fontes=devices.filter(d=>isFonte(d.key));
      if(!fontes.length){
        const dcDevs=devices.filter(d=>needsDCPower(d.key));
        if(dcDevs.length>0) return `${dcDevs.length} dispositivo(s) DC sem fonte 12V no projeto`;
      }
      return null;
    }},
  {cat:'Incêndio',regra:'Detectores/acionadores sem central de incêndio',sev:'CRÍTICA',
    check:(devices)=>{
      const detectors=devices.filter(d=>isDetectorIncendio(d.key)||d.key.startsWith('sirene_inc_')||d.key.startsWith('modulo_inc_')).length;
      const centrais=devices.filter(d=>isCentralIncendio(d.key)).length;
      if(detectors>0&&centrais===0) return `${detectors} dispositivo(s) de incêndio sem central`;
      return null;
    }},
  {cat:'Intrusão',regra:'Sensores/sirenes sem central de alarme',sev:'ALTA',
    check:(devices)=>{
      const sensores=devices.filter(d=>isSensorZona(d.key)||isSirene(d.key)).length;
      const centrais=devices.filter(d=>isCentralAlarme(d.key)).length;
      if(sensores>0&&centrais===0) return `${sensores} sensor(es)/sirene(s) sem central de alarme`;
      return null;
    }},
];

function findDevDef(key){
  for(const cat of DEVICE_LIB) for(const item of cat.items) if(item.key===key) return item;
  // Check custom devices
  try {
    const custom=JSON.parse(localStorage.getItem('bim_custom_devices')||'[]');
    const found=custom.find(c=>c.key===key);
    if(found) return found;
  }catch(e){}
  return null;
}

function getCustomDevices(){
  try {
    return JSON.parse(localStorage.getItem('bim_custom_devices')||'[]');
  }catch(e){
    return [];
  }
}

function saveCustomDevices(devices){
  localStorage.setItem('bim_custom_devices',JSON.stringify(devices));
}

function getDeviceIconKey(deviceKey){
  if(deviceKey.startsWith('custom_')){
    const custom=getCustomDevices().find(c=>c.key===deviceKey);
    return custom?custom.deviceType:deviceKey;
  }
  return deviceKey;
}

// ====================================================================
// MAIN APP COMPONENT
// ====================================================================
function App(){
  const [screen,setScreen]=useState('dashboard'); // dashboard | projects | client | scenario | project | clients | repo | settings | subscription
  const [project,_setProject]=useState(null);
  const _historyStore=useRef({past:[],future:[]});
  const _skipHistory=useRef(false);
  const setProject=(updaterOrVal)=>{
    _setProject(prev=>{
      try{
        const next=typeof updaterOrVal==='function'?updaterOrVal(prev):updaterOrVal;
        if(!_skipHistory.current && prev && next){
          try{
            const ps=JSON.stringify(prev);const ns=JSON.stringify(next);
            if(ps!==ns){const h=_historyStore.current;h.past.push(ps);if(h.past.length>50)h.past.shift();h.future=[];}
          }catch(e){console.warn('History snapshot failed',e)}
        }
        _skipHistory.current=false;
        return next;
      }catch(e){console.error('setProject error',e);_skipHistory.current=false;return prev;}
    });
  };
  const undo=()=>{
    try{
      const h=_historyStore.current;
      if(!h||!h.past||!h.past.length) return;
      _setProject(prev=>{
        h.future.push(JSON.stringify(prev));
        const restored=JSON.parse(h.past.pop());
        _skipHistory.current=true;
        return restored;
      });
    }catch(e){console.error('undo error',e)}
  };
  const redo=()=>{
    try{
      const h=_historyStore.current;
      if(!h||!h.future||!h.future.length) return;
      _setProject(prev=>{
        h.past.push(JSON.stringify(prev));
        const restored=JSON.parse(h.future.pop());
        _skipHistory.current=true;
        return restored;
      });
    }catch(e){console.error('redo error',e)}
  };
  const [editingProjectId,setEditingProjectId]=useState(null);
  const [clientData,setClientData]=useState({
    nome:'',razaoSocial:'',cnpj:'',cpf:'',tipo:'pj',
    endereco:'',cidade:'',uf:'',cep:'',
    contato:'',telefone:'',email:'',
    projetoNome:'',projetoRef:'',obs:''
  });

  // Auto-save project to localStorage
  useEffect(()=>{
    if(project && editingProjectId){
      const projects=getSavedProjects();
      const idx=projects.findIndex(p=>p.id===editingProjectId);
      const updated={
        id:editingProjectId,
        name:project.name,
        client:{...project.client},
        scenario:project.scenario,
        floors:project.floors,
        activeFloor:project.activeFloor,
        settings:project.settings,
        createdAt:idx>=0?projects[idx].createdAt:new Date().toISOString().split('T')[0],
        updatedAt:new Date().toISOString().split('T')[0],
        deviceCount:project.floors.flatMap(f=>f.devices).length,
        status:'rascunho'
      };
      if(idx>=0) projects[idx]=updated;
      else projects.push(updated);
      saveProjects(projects);
    }
  },[project,editingProjectId]);

  const onStartNewProject=()=>{ setClientData({nome:'',razaoSocial:'',cnpj:'',cpf:'',tipo:'pj',endereco:'',cidade:'',uf:'',cep:'',contato:'',telefone:'',email:'',projetoNome:'',projetoRef:'',obs:''}); setScreen('client'); };
  const onOpenProject=(proj)=>{ setProject({name:proj.name,scenario:proj.scenario,client:{...proj.client},floors:proj.floors,activeFloor:proj.activeFloor,settings:proj.settings}); setEditingProjectId(proj.id); setScreen('project'); };

  if(screen==='dashboard') return <Dashboard
    onNewProject={onStartNewProject}
    onOpenProject={()=>setScreen('projects')}
    onClients={()=>setScreen('clients')}
    onRepo={()=>setScreen('repo')}
    onSettings={()=>setScreen('settings')}
    onSubscription={()=>setScreen('subscription')}
  />;

  if(screen==='projects') return <ProjectListPage onBack={()=>setScreen('dashboard')} onOpenProject={onOpenProject}/>;

  if(screen==='client') return <ClientForm data={clientData} setData={setClientData} onNext={()=>setScreen('scenario')} onBack={()=>setScreen('dashboard')} />;

  if(screen==='scenario') return <ScenarioSelect clientData={clientData} onBack={()=>setScreen('client')} onStart={(scenario)=>{
    const projId='proj_'+Date.now();
    const newProj={
      name:clientData.projetoNome||'Novo Projeto',
      scenario,
      client:{...clientData},
      floors:[{id:'f1',name:'Térreo',number:0,devices:[],connections:[],environments:[]}],
      activeFloor:'f1',
      settings:{taxRate:0,additionalFees:[]},
    };
    setProject(newProj);
    setEditingProjectId(projId);
    // Save client
    const clients=getSavedClients();
    const existing=clients.findIndex(c=>c.id===clientData.id);
    if(existing>=0) clients[existing]={...clientData,id:clientData.id||'cli_'+Date.now()};
    else clients.push({...clientData,id:'cli_'+Date.now()});
    saveClients(clients);
    setScreen('project');
  }}/>;

  if(screen==='clients') return <ClientListPage onBack={()=>setScreen('dashboard')} onSelectClient={(client)=>{ setClientData(client); setScreen('client'); }}/>;

  if(screen==='repo') return <EquipmentRepoPage onBack={()=>setScreen('dashboard')} />;

  if(screen==='settings') return <SettingsPage onBack={()=>setScreen('dashboard')} />;

  if(screen==='subscription') return <SubscriptionPage onBack={()=>setScreen('dashboard')} />;

  return <ProjectApp project={project} setProject={setProject} undo={undo} redo={redo} onBack={()=>setScreen('dashboard')}/>;
}

function ClientForm({data,setData,onNext,onBack}){
  const upd=(k,v)=>setData(d=>({...d,[k]:v}));
  const updMulti=(obj)=>setData(d=>({...d,...obj}));
  const canProceed=data.tipo==='pj'?(data.razaoSocial||data.nome):data.nome;
  const [cnpjLoading,setCnpjLoading]=useState(false);
  const [cnpjStatus,setCnpjStatus]=useState(null); // null | 'success' | 'error' | 'notfound'
  const [cepLoading,setCepLoading]=useState(false);
  const [cepStatus,setCepStatus]=useState(null);

  // Busca CNPJ via BrasilAPI (gratuita)
  const fetchCNPJ=async(cnpjRaw)=>{
    const digits=cnpjRaw.replace(/\D/g,'');
    if(digits.length!==14){setCnpjStatus(null);return}
    setCnpjLoading(true);setCnpjStatus(null);
    try{
      const res=await fetch(`https://brasilapi.com.br/api/cnpj/v1/${digits}`);
      if(!res.ok) throw new Error(res.status===404?'notfound':'error');
      const d=await res.json();
      // Build update object — only overwrite if API returns real data
      const updates={};
      if(d.razao_social) updates.razaoSocial=d.razao_social;
      if(d.nome_fantasia) updates.nome=d.nome_fantasia;
      const addr=[d.logradouro,d.numero,d.complemento].filter(Boolean).join(', ');
      if(addr) updates.endereco=addr;
      if(d.municipio) updates.cidade=d.municipio;
      if(d.uf) updates.uf=d.uf;
      if(d.cep) updates.cep=d.cep.replace(/(\d{5})(\d{3})/,'$1-$2');
      if(d.email && d.email!=='null' && d.email.includes('@')) updates.email=d.email;
      // Telefone: ddd_telefone_1 vem como "7133xxx" (DDD+numero junto) ou vazio
      if(d.ddd_telefone_1 && d.ddd_telefone_1.length>=10){
        const t=d.ddd_telefone_1.replace(/\D/g,'');
        if(t.length>=10) updates.telefone=`(${t.slice(0,2)}) ${t.length>10?t.slice(2,7)+'-'+t.slice(7):t.slice(2,6)+'-'+t.slice(6)}`;
      }
      setData(prev=>({...prev,...updates}));
      setCnpjStatus('success');
    }catch(err){
      setCnpjStatus(err.message==='notfound'?'notfound':'error');
    }finally{setCnpjLoading(false)}
  };

  // Busca CEP via BrasilAPI (gratuita)
  const fetchCEP=async(cepRaw)=>{
    const digits=cepRaw.replace(/\D/g,'');
    if(digits.length!==8){setCepStatus(null);return}
    setCepLoading(true);setCepStatus(null);
    try{
      const res=await fetch(`https://brasilapi.com.br/api/cep/v2/${digits}`);
      if(!res.ok) throw new Error(res.status===404?'notfound':'error');
      const d=await res.json();
      const updates={};
      if(d.street) updates.endereco=d.street;
      if(d.city) updates.cidade=d.city;
      if(d.state) updates.uf=d.state;
      if(d.neighborhood) updates.bairro=d.neighborhood;
      setData(prev=>({...prev,...updates}));
      setCepStatus('success');
    }catch(err){
      setCepStatus(err.message==='notfound'?'notfound':'error');
    }finally{setCepLoading(false)}
  };

  // CNPJ mask
  const maskCNPJ=(v)=>{
    const d=v.replace(/\D/g,'').slice(0,14);
    if(d.length<=2) return d;
    if(d.length<=5) return d.replace(/(\d{2})(\d)/,'$1.$2');
    if(d.length<=8) return d.replace(/(\d{2})(\d{3})(\d)/,'$1.$2.$3');
    if(d.length<=12) return d.replace(/(\d{2})(\d{3})(\d{3})(\d)/,'$1.$2.$3/$4');
    return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d)/,'$1.$2.$3/$4-$5');
  };
  // CPF mask
  const maskCPF=(v)=>{
    const d=v.replace(/\D/g,'').slice(0,11);
    if(d.length<=3) return d;
    if(d.length<=6) return d.replace(/(\d{3})(\d)/,'$1.$2');
    if(d.length<=9) return d.replace(/(\d{3})(\d{3})(\d)/,'$1.$2.$3');
    return d.replace(/(\d{3})(\d{3})(\d{3})(\d)/,'$1.$2.$3-$4');
  };
  // CEP mask
  const maskCEP=(v)=>{
    const d=v.replace(/\D/g,'').slice(0,8);
    if(d.length<=5) return d;
    return d.replace(/(\d{5})(\d)/,'$1-$2');
  };
  // Phone mask
  const maskPhone=(v)=>{
    const d=v.replace(/\D/g,'').slice(0,11);
    if(d.length<=2) return d.length?`(${d}`:d;
    if(d.length<=6) return `(${d.slice(0,2)}) ${d.slice(2)}`;
    if(d.length<=10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
    return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  };

  return (
    <div className="landing">
      <div className="landing-logo">PROTECTOR SISTEMAS</div>
      <div className="landing-title">BIM Segurança Eletrônica</div>
      <div style={{fontSize:11,color:'var(--cinza)',marginTop:-8,marginBottom:8}}>{APP_VERSION.label} · {APP_VERSION.date}</div>

      <div className="client-form">
        <div className="cf-title">📋 Dados do Cliente</div>
        <div className="cf-sub">Preencha as informações do cliente para o projeto</div>

        {/* Tipo de pessoa */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {[{id:'pj',label:'Pessoa Jurídica'},{id:'pf',label:'Pessoa Física'}].map(t=>(
            <button key={t.id} onClick={()=>upd('tipo',t.id)}
              style={{flex:1,padding:'8px',borderRadius:8,border:`2px solid ${data.tipo===t.id?'var(--laranja)':'rgba(255,255,255,.12)'}`,
                background:data.tipo===t.id?'rgba(241,196,15,.12)':'transparent',
                color:data.tipo===t.id?'var(--laranja)':'rgba(255,255,255,.5)',
                fontSize:11,fontWeight:700,cursor:'pointer',transition:'.2s'}}>
              {t.id==='pj'?'🏢':'👤'} {t.label}
            </button>
          ))}
        </div>

        <div className="cf-section">{data.tipo==='pj'?'Dados da Empresa':'Dados Pessoais'}</div>
        <div className="cf-grid">
          {data.tipo==='pj'&&(
            <div className="cf-field" style={{gridColumn:'1/-1'}}>
              <label>Razão Social *</label>
              <input value={data.razaoSocial} onChange={e=>upd('razaoSocial',e.target.value)} placeholder="Nome da empresa"/>
            </div>
          )}
          <div className="cf-field" style={data.tipo==='pf'?{gridColumn:'1/-1'}:{}}>
            <label>{data.tipo==='pj'?'Nome Fantasia':'Nome Completo *'}</label>
            <input value={data.nome} onChange={e=>upd('nome',e.target.value)} placeholder={data.tipo==='pj'?'Nome fantasia':'Nome do cliente'}/>
          </div>
          <div className="cf-field">
            <label>{data.tipo==='pj'?'CNPJ':'CPF'}
              {data.tipo==='pj'&&cnpjStatus==='success'&&<span style={{color:'#22c55e',marginLeft:6,fontSize:9}}>✓ Encontrado</span>}
              {data.tipo==='pj'&&cnpjStatus==='notfound'&&<span style={{color:'#ef4444',marginLeft:6,fontSize:9}}>✕ Não encontrado</span>}
              {data.tipo==='pj'&&cnpjStatus==='error'&&<span style={{color:'#ef4444',marginLeft:6,fontSize:9}}>✕ Erro na consulta</span>}
            </label>
            <div style={{display:'flex',gap:6}}>
              <input value={data.tipo==='pj'?data.cnpj:data.cpf} style={{flex:1}}
                onChange={e=>{
                  const val=data.tipo==='pj'?maskCNPJ(e.target.value):maskCPF(e.target.value);
                  upd(data.tipo==='pj'?'cnpj':'cpf',val);
                  if(data.tipo==='pj'&&val.replace(/\D/g,'').length===14) fetchCNPJ(val);
                }}
                placeholder={data.tipo==='pj'?'00.000.000/0000-00':'000.000.000-00'}/>
              {data.tipo==='pj'&&(
                <button onClick={()=>fetchCNPJ(data.cnpj)} disabled={cnpjLoading||data.cnpj.replace(/\D/g,'').length!==14}
                  style={{padding:'0 12px',borderRadius:8,border:'1px solid rgba(255,255,255,.15)',
                    background:cnpjLoading?'rgba(255,255,255,.05)':'rgba(241,196,15,.15)',
                    color:cnpjLoading?'rgba(255,255,255,.3)':'var(--laranja)',fontSize:10,fontWeight:700,
                    cursor:cnpjLoading?'wait':'pointer',whiteSpace:'nowrap',transition:'.2s'}}>

        <div className="cf-section">Endereço</div>

              <option value="">Selecione</option>
              {['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'].map(u=>(

          </div>
          <div className="cf-field">

              {cepStatus==='success'&&<span style={{color:'#22c55e',marginLeft:6,fontSize:9}}>✓ Encontrado</span>}

            </label>
            <div style={{display:'flex',gap:6}}>

function ProjectApp({project,setProject,undo,redo,onBack}){
  const [rightTab,setRightTab]=useState('props'); // props | topology | equipment | validation
  const [leftTab,setLeftTab]=useState('devices'); // devices | environments | floors
  const [selectedDevice,setSelectedDevice]=useState(null);
  const [tool,setTool]=useState('select'); // select | device | cable | env | measure
  const [pendingDevice,setPendingDevice]=useState(null);
  const [cableType,setCableType]=useState('cat6');
  const [routeType,setRouteType]=useState('straight'); // straight | curve | angle
  const [cableMode,setCableMode]=useState(null); // null | {from:deviceId, ifaceType?, ifaceLabel?}
  const [portPopup,setPortPopup]=useState(null); // null | {devId,x,y} - connection port selector popup
  const [showExport,setShowExport]=useState(false);
  const [search,setSearch]=useState('');
  const [collapsedCats,setCollapsedCats]=useState({});
  const [editingFloorId,setEditingFloorId]=useState(null);
  const [showCableLabels,setShowCableLabels]=useState(true);
  const toggleCat=(catName)=>setCollapsedCats(prev=>({...prev,[catName]:!prev[catName]}));
  const [modelSelectorModal,setModelSelectorModal]=useState(null); // null | {deviceKey,x,y}
  const [showEquipmentRepo,setShowEquipmentRepo]=useState(false);
  const [customDevices,setCustomDevices]=useState(()=>getCustomDevices());
  const [selectedConn,setSelectedConn]=useState(null); // selected connection id
  const [draggingWp,setDraggingWp]=useState(null); // {connId, wpIdx, startX, startY, origX, origY} or {connId, insertAfter, startX, startY, origX, origY}
  const canvasRef=useRef(null);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [dragging,setDragging]=useState(null);

  const floor=project.floors.find(f=>f.id===project.activeFloor);
  const devices=floor?.devices||[];
  const connections=floor?.connections||[];
  const environments=floor?.environments||[];

  // Update floor data helper
  const updateFloor=(updater)=>{
    setProject(p=>({...p,floors:p.floors.map(f=>f.id===p.activeFloor?updater(f):f)}));
  };

  // All devices across all floors
  const allDevices=useMemo(()=>project.floors.flatMap(f=>f.devices),[project.floors]);

  // Add device to canvas
  const addDevice=(deviceKey,x,y,selectedModel=null)=>{
    const def=findDevDef(deviceKey);
    if(!def) return;

    // If configurable and has catalog models, show modal for model selection
    const catalogMap={nobreak_ac:'nobreak_ac',nobreak_dc:'nobreak_dc',bateria_ext:'bateria',modulo_bat:'modulo_bat'};
    const hasCatalog=MODEL_CATALOG[catalogMap[deviceKey]];
    if(def.configurable && !selectedModel && hasCatalog){
      setModelSelectorModal({deviceKey,x:x||200+Math.random()*400,y:y||150+Math.random()*300});
      return;
    }

    // Build config object if model was selected
    let config={};
    if(selectedModel && selectedModel.id){
      config={modelId:selectedModel.id,modelData:selectedModel};
    }

    // For custom devices, store custom specs and inherit icon/interfaces from base device
    const isCustom=deviceKey.startsWith('custom_');
    const baseKey=isCustom?def.deviceType:deviceKey;
    if(isCustom){
      config.customSpecs=def.specs||{};
      config.brand=def.brand;
      config.model=def.model;
    }

    const newDev={id:uid(),key:deviceKey,name:def.name,x:x||200+Math.random()*400,y:y||150+Math.random()*300,
      model:selectedModel?.model||'',envId:null,config,props:{...def.props}};
    updateFloor(f=>({...f,devices:[...f.devices,newDev]}));
    setSelectedDevice(newDev.id);
    setRightTab('props');
    setPendingDevice(null);
    setModelSelectorModal(null);
    setTool('select');
  };

  // Move device
  const moveDevice=(devId,x,y)=>{
    updateFloor(f=>({...f,devices:f.devices.map(d=>d.id===devId?{...d,x,y}:d)}));
  };

  // Delete device
  const deleteDevice=(devId)=>{
    updateFloor(f=>({
      ...f,
      devices:f.devices.filter(d=>d.id!==devId),
      connections:f.connections.filter(c=>c.from!==devId&&c.to!==devId)
    }));
    if(selectedDevice===devId) setSelectedDevice(null);
  };

  // Update device properties
  const updateDevice=(devId,updates)=>{
    updateFloor(f=>({...f,devices:f.devices.map(d=>d.id===devId?{...d,...updates}:d)}));
  };

  // Copy device
  const copyDevice=(devId)=>{
    const dev=devices.find(d=>d.id===devId);
    if(!dev) return;
    const newDev={...dev,id:uid(),x:dev.x+40,y:dev.y+40,name:dev.name+' (cópia)'};
    updateFloor(f=>({...f,devices:[...f.devices,newDev]}));
    setSelectedDevice(newDev.id);
  };

  // Save custom device to localStorage
  const saveCustomDevice=(customDevice)=>{
    const updated=[...customDevices.filter(c=>c.id!==customDevice.id),customDevice];
    setCustomDevices(updated);
    saveCustomDevices(updated);
  };

  // Delete custom device
  const deleteCustomDevice=(customId)=>{
    const updated=customDevices.filter(c=>c.id!==customId);
    setCustomDevices(updated);
    saveCustomDevices(updated);
  };

  // Connection validation toast state
  const [connToast,setConnToast]=React.useState(null);
  const showConnToast=(msg,type='error')=>{
    setConnToast({msg,type});
    setTimeout(()=>setConnToast(null),4000);
  };

  // Cable picker state for multi-option connections
  const [cablePicker,setCablePicker]=React.useState(null);

  // Add connection with validation — supports multiple connections between same pair (different ifaceType)
  const addConnection=(fromId,toId,type)=>{
    try{
    if(fromId===toId){setCableMode(null);setTool('select');return}
    const fromDev=devices.find(d=>d.id===fromId);
    const toDev=devices.find(d=>d.id===toId);
    if(!fromDev||!toDev) return;

    // Get ifaceType from cableMode (set by port popup) — allows multiple connections if different port types
    const ifaceType=cableMode?.ifaceType||null;
    const ifaceLabel=cableMode?.ifaceLabel||'';

    // Check duplicate: block only if SAME pair + SAME ifaceType (or both null)
    const dupExists=connections.some(c=>{
      const samePair=(c.from===fromId&&c.to===toId)||(c.from===toId&&c.to===fromId);
      if(!samePair) return false;
      // If both have ifaceType, block only if same type
      if(ifaceType && c.ifaceType) return c.ifaceType===ifaceType;
      // If neither has ifaceType (legacy/auto), block duplicate
      if(!ifaceType && !c.ifaceType) return true;
      return false;
    });
    if(dupExists){showConnToast('Conexão deste tipo já existe entre estes dispositivos','warn');setCableMode(null);setTool('select');return}

    const dx=fromDev.x-toDev.x;const dy=fromDev.y-toDev.y;
    const dist=Math.round(Math.sqrt(dx*dx+dy*dy)/10);

    // Validate connection (use base device keys for custom devices)
    const chosenCable=type||cableType;
    const fromKey=getDeviceIconKey(fromDev.key);
    const toKey=getDeviceIconKey(toDev.key);
    const validation=validateConnection(fromKey,toKey,chosenCable);

    if(!validation.valid && validation.cables.length===0){
      showConnToast(`✕ ${validation.reason}`,'error');
      setCableMode(null);setTool('select');
      return;
    }

    if(!validation.valid && validation.cables.length>0){
      setCablePicker({fromId,toId,dist,cables:validation.cables,reason:validation.reason,ifaceType,ifaceLabel});
      setCableMode(null);
      return;
    }

    // Auto-calculate PP cable section if chosen cable is PP type
    let finalCable=chosenCable;
    const chosenCT=CABLE_TYPES.find(c=>c.id===chosenCable);
    if(chosenCT?.vias && chosenCT?.secao){
      const recommended=calcPPSection(dist,chosenCT.vias);
      if(recommended.secao!==chosenCT.secao){
        finalCable=recommended.id;
        showConnToast(`📐 Auto-ajuste: ${dist}m → ${recommended.label} (seção calculada pela distância)`,'info');
      }
    }

    // Valid — create connection with ifaceType metadata + route
    const purpose=validation.purpose||'dados';
    updateFloor(f=>({...f,connections:[...f.connections,{
      id:uid(),from:fromId,to:toId,type:finalCable,distance:dist,purpose,
      ifaceType:ifaceType||null,ifaceLabel:ifaceLabel||'',route:routeType||'straight'
    }]}));
    const portInfo=ifaceLabel?` [${ifaceLabel}]`:'';
    const fcName=CABLE_TYPES.find(c=>c.id===finalCable)?.name||finalCable;
    showConnToast(`✓ ${fcName} · ${dist}m · ${purpose}${portInfo}`,'success');
    setCableMode(null);setTool('select');
    }catch(err){console.error('addConnection error',err);setCableMode(null);setTool('select');showConnToast('Erro ao conectar: '+err.message,'error');}
  };

  // Confirm cable from picker
  const confirmCablePick=(cableId)=>{
    if(!cablePicker) return;
    const {fromId,toId,dist,ifaceType,ifaceLabel}=cablePicker;
    const fromDev=devices.find(d=>d.id===fromId);
    const toDev=devices.find(d=>d.id===toId);
    const validation=validateConnection(fromDev.key,toDev.key,cableId);
    // Auto-calc PP section for picker too
    let pickCable=cableId;
    const pickCT=CABLE_TYPES.find(c=>c.id===cableId);
    if(pickCT?.vias&&pickCT?.secao){const rec=calcPPSection(dist,pickCT.vias);if(rec.secao!==pickCT.secao) pickCable=rec.id;}
    updateFloor(f=>({...f,connections:[...f.connections,{
      id:uid(),from:fromId,to:toId,type:pickCable,distance:dist,purpose:validation.purpose||'dados',
      ifaceType:ifaceType||null,ifaceLabel:ifaceLabel||'',route:routeType||'straight'
    }]}));
    showConnToast(`✓ ${CABLE_TYPES.find(c=>c.id===cableId)?.name} · ${dist}m`,'success');
    setCablePicker(null);
  };

  // Delete connection
  const deleteConnection=(connId)=>{
    updateFloor(f=>({...f,connections:f.connections.filter(c=>c.id!==connId)}));
    if(selectedConn===connId) setSelectedConn(null);
  };

  // ---- draw.io-style cable routing with orthogonal segments ----
  const updateConnWaypoints=(connId,waypoints)=>{
    updateFloor(f=>({...f,connections:f.connections.map(c=>
      c.id===connId?{...c,waypoints}:c
    )}));
  };
  const deleteWaypoint=(connId,wpIdx)=>{
    const conn=connections.find(c=>c.id===connId);
    if(!conn||!conn.waypoints) return;
    const wps=[...(conn.waypoints)];
    wps.splice(wpIdx,1);
    updateConnWaypoints(connId,wps.length?wps:undefined);
  };

  // Auto-generate orthogonal route (draw.io style) from start to end
  const autoOrthoRoute=(x1,y1,x2,y2)=>{
    // Simple L-route or Z-route for orthogonal connections
    const dx=x2-x1,dy=y2-y1;
    const absDx=Math.abs(dx),absDy=Math.abs(dy);
    if(absDx<5||absDy<5){
      // Nearly aligned — straight line
      return [{x:x1,y:y1},{x:x2,y:y2}];
    }
    // Z-route through midpoint: go horizontal, then vertical, then horizontal
    const mx=(x1+x2)/2;
    return [{x:x1,y:y1},{x:mx,y:y1},{x:mx,y:y2},{x:x2,y:y2}];
  };

  // Build polyline path from array of points (orthogonal segments with rounded corners)
  const buildOrthoPath=(pts,radius=8)=>{
    if(pts.length<2) return '';
    if(pts.length===2) return `M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y}`;
    let d=`M${pts[0].x},${pts[0].y}`;
    for(let i=1;i<pts.length-1;i++){
      const prev=pts[i-1],curr=pts[i],next=pts[i+1];
      // Vector from prev to curr and curr to next
      const dx1=curr.x-prev.x,dy1=curr.y-prev.y;
      const dx2=next.x-curr.x,dy2=next.y-curr.y;
      const len1=Math.sqrt(dx1*dx1+dy1*dy1)||1;
      const len2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
      const r=Math.min(radius,len1/2,len2/2);
      // Points before and after the corner
      const bx=curr.x-dx1/len1*r,by=curr.y-dy1/len1*r;
      const ax=curr.x+dx2/len2*r,ay=curr.y+dy2/len2*r;
      d+=` L${bx},${by} Q${curr.x},${curr.y} ${ax},${ay}`;
    }
    d+=` L${pts[pts.length-1].x},${pts[pts.length-1].y}`;
    return d;
  };

  // Drag waypoint or segment — draw.io style
  useEffect(()=>{
    if(!draggingWp) return;
    const onMove=(e)=>{
      const rect=canvasRef.current?.getBoundingClientRect();
      if(!rect) return;
      const mx=(e.clientX-rect.left)/zoom-pan.x/zoom;
      const my=(e.clientY-rect.top)/zoom-pan.y/zoom;
      const conn=connections.find(c=>c.id===draggingWp.connId);
      if(!conn) return;
      const wps=[...(conn.waypoints||[])];
      if(draggingWp.type==='point'){
        // Drag single waypoint (draw.io blue square)
        wps[draggingWp.wpIdx]={x:mx,y:my};
        updateConnWaypoints(draggingWp.connId,wps);
      } else if(draggingWp.type==='seg'){
        // Drag entire segment — move two endpoints of the segment
        // Determine if segment is horizontal or vertical, then constrain
        const si=draggingWp.segIdx;
        const p1=wps[si],p2=wps[si+1];
        if(!p1||!p2) return;
        const isHoriz=Math.abs(p1.y-p2.y)<Math.abs(p1.x-p2.x);
        if(!isHoriz){
          // Vertical segment — move horizontally
          const dx=mx-draggingWp.lastX;
          wps[si]={x:p1.x+dx,y:p1.y};
          wps[si+1]={x:p2.x+dx,y:p2.y};
        } else {
          // Horizontal segment — move vertically
          const dy=my-draggingWp.lastY;
          wps[si]={x:p1.x,y:p1.y+dy};
          wps[si+1]={x:p2.x,y:p2.y+dy};
        }
        draggingWp.lastX=mx;
        draggingWp.lastY=my;
        updateConnWaypoints(draggingWp.connId,wps);
      } else if(draggingWp.type==='newSeg'){
        // Creating a new bend by dragging a straight segment
        // Insert two waypoints to create the bend
        const si=draggingWp.segIdx;
        const allPts=draggingWp.allPts;
        const p1=allPts[si],p2=allPts[si+1];
        if(!p1||!p2) return;
        const isHoriz=Math.abs(p1.y-p2.y)<Math.abs(p1.x-p2.x);
        // Convert to two new waypoints forming a Z-bend
        const midX=(p1.x+p2.x)/2;
        const midY=(p1.y+p2.y)/2;
        let newWps;
        if(isHoriz){
          newWps=[{x:midX,y:p1.y},{x:midX,y:my}];
          // Replace: insert 2 waypoints at the segment break
        } else {
          newWps=[{x:p1.x,y:midY},{x:mx,y:midY}];
        }
        const wpInsertIdx=si; // index in waypoints array
        const updWps=[...(conn.waypoints||[])];
        updWps.splice(wpInsertIdx,0,...newWps);
        updateConnWaypoints(draggingWp.connId,updWps);
        // Switch to segment drag mode for the newly created middle segment
        setDraggingWp({...draggingWp,type:'seg',segIdx:wpInsertIdx,lastX:mx,lastY:my});
      }
    };
    const onUp=()=>setDraggingWp(null);
    window.addEventListener('mousemove',onMove);
