// ====================================================================
// EQUIPMENT REPOSITORY MODAL
// ====================================================================
function EquipmentRepoModal({customDevices,onSave,onDelete,onClose}){
  const [step,setStep]=useState(1); // 1=list, 2=add form step 1 (category), 3=add form step 2 (base device), 4=common, 5=specs
  const [editingDevice,setEditingDevice]=useState(null);
  const [formState,setFormState]=useState({
    category:'camera',
    baseDeviceType:'cam_dome',
    brand:'',
    model:'',
    descricao:'',
    referencia:'',
    preco:'',
    specs:{},
    datasheetText:''
  });

  const handleCategorySelect=(category)=>{
    setFormState(f=>({...f,category,baseDeviceType:''}));
    setStep(3); // skip to base device selection
  };

  const handleBaseDeviceSelect=(deviceKey)=>{
    setFormState(f=>({...f,baseDeviceType:deviceKey}));
    setStep(4);
  };

  const handleCommonFieldChange=(key,value)=>{
    setFormState(f=>({...f,[key]:value}));
  };

  const handleSpecChange=(key,value)=>{
    setFormState(f=>({...f,specs:{...f.specs,[key]:value}}));
  };

  const parseDatasheet=()=>{
    const text=formState.datasheetText;
    const specs={...formState.specs};

    // Voltage patterns
    const voltageMatch=text.match(/(\d+[\.,]?\d*)\s*(V|Vcc|VDC|VAC|volts?)/gi);
    if(voltageMatch&&formState.category==='fechadura'){
      specs.tensao=voltageMatch[0].replace(/[^\d.,]/g,'').replace(',','.').substring(0,5)+' V';
    }

    // Current patterns
    const currentMatch=text.match(/(\d+[\.,]?\d*)\s*(A|mA|ampere)/gi);
    if(currentMatch&&formState.category==='fechadura'){
      specs.corrente=currentMatch[0].replace(/[^\d.,]/g,'').replace(',','.')+' A';
    }

    // Power patterns
    const powerMatch=text.match(/(\d+[\.,]?\d*)\s*(W|VA|watts?)/gi);
    if(powerMatch){
      const val=powerMatch[0].replace(/[^\d.,]/g,'').replace(',','.');
      if(formState.category==='fonte_energia') specs.potencia=val+' W';
      if(formState.category==='nobreak') specs.potencia_w=parseInt(val)||0;
    }

    // Resolution patterns
    const resMatch=text.match(/(\d+)\s*MP/i);
    if(resMatch&&formState.category==='camera'){
      specs.resolucao=resMatch[1]+'MP';
    }

    // Ports patterns
    const portsMatch=text.match(/(\d+)\s*(portas?|ports?)/i);
    if(portsMatch){
      const num=parseInt(portsMatch[1]);
      if(formState.category==='switch_rede') specs.portas=num;
      if(formState.category==='acesso') specs.saidas_relay=num;
    }

    // IP rating
    const ipMatch=text.match(/IP\s*(\d{2})/i);
    if(ipMatch&&formState.category==='camera'){
      specs.ip_rating='IP '+ipMatch[1];
    }

    // Weight
    const weightMatch=text.match(/(\d+[\.,]?\d*)\s*(kg|g)\b/i);
    if(weightMatch&&formState.category==='infra'){
      specs.peso=weightMatch[0].replace(',','.');
    }

    setFormState(f=>({...f,specs}));
  };

  const handleSave=()=>{
    if(!formState.brand||!formState.model||!formState.baseDeviceType){
      alert('Preencha marca, modelo e tipo de dispositivo base');
      return;
    }

    const customDev={
      id:editingDevice?.id||'custom_'+Date.now(),
      key:'custom_'+(editingDevice?.id||Date.now()),
      name:formState.brand+' '+formState.model,
      category:formState.category,
      deviceType:formState.baseDeviceType,
      brand:formState.brand,
      model:formState.model,
      descricao:formState.descricao,
      referencia:formState.referencia,
      preco:formState.preco,
      specs:formState.specs,
      createdAt:new Date().toISOString().split('T')[0],
      datasheetText:formState.datasheetText
    };

    onSave(customDev);
    setStep(1);
    setEditingDevice(null);
    setFormState({category:'camera',baseDeviceType:'',brand:'',model:'',descricao:'',referencia:'',preco:'',specs:{},datasheetText:''});
  };

  const categoryLabels={
    camera:'Câmeras',acesso:'Acesso',fechadura:'Fechadura',alarme:'Alarme',sensor:'Sensores',
    switch_rede:'Switches',gravador:'Gravador',fonte_energia:'Fonte',nobreak:'Nobreak',infra:'Infraestrutura'
  };

  const getCategoryDevices=(category)=>{
    return DEVICE_LIB.find(c=>c.items.some(i=>EQUIPMENT_SCHEMAS[category]?.some(s=>i.key===category)))?.items||
           DEVICE_LIB.flatMap(c=>c.items).filter(i=>{
             const schema=EQUIPMENT_SCHEMAS[category];
             return schema && i.key.startsWith(category.substring(0,3));
           });
  };

  if(step===1){
    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:700}}>
          <h3>📦 Repositório de Equipamentos</h3>
          <div style={{fontSize:11,color:'var(--cinza)',marginBottom:16}}>
            Gerencie seus equipamentos personalizados para uso em projetos
          </div>

          <div style={{maxHeight:350,overflowY:'auto',marginBottom:16,borderTop:'1px solid #e5e8eb',paddingTop:8}}>
            {customDevices.length===0?(
              <div style={{textAlign:'center',padding:'32px 16px',color:'var(--cinza)',fontSize:11}}>
                Nenhum equipamento personalizado ainda.<br/>Clique em "Novo equipamento" para começar.
              </div>
            ):(
              customDevices.map(dev=>(
                <div key={dev.id} style={{padding:10,marginBottom:8,background:'#f8f9fa',borderRadius:6,
                  borderLeft:'3px solid '+({camera:'#f59e0b',acesso:'#3b82f6',fechadura:'#ef4444',
                    alarme:'#f97316',sensor:'#84cc16',switch_rede:'#06b6d4',gravador:'#8b5cf6',
                    fonte_energia:'#ec4899',nobreak:'#f43f5e',infra:'#6b7280'}[dev.category]||'#999')}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:6}}>
                    <div>
                      <div style={{fontWeight:600,color:'var(--azul)',fontSize:12}}>{dev.name}</div>
                      <div style={{fontSize:9,color:'var(--cinza)',marginTop:2}}>
                        {categoryLabels[dev.category]} • {dev.deviceType}
                      </div>
                    </div>
                    <div style={{display:'flex',gap:4}}>
                      <button onClick={()=>{setEditingDevice(dev);setFormState({category:dev.category,baseDeviceType:dev.deviceType,
                        brand:dev.brand,model:dev.model,descricao:dev.descricao,referencia:dev.referencia,preco:dev.preco,
                        specs:dev.specs,datasheetText:dev.datasheetText});setStep(4);}}
                        style={{padding:'4px 10px',fontSize:9,background:'var(--azul2)',color:'#fff',border:'none',
                          borderRadius:4,cursor:'pointer',transition:'.15s'}}
                        onMouseOver={e=>e.currentTarget.style.opacity='.8'}
                        onMouseOut={e=>e.currentTarget.style.opacity='1'}>Editar</button>
                      <button onClick={()=>onDelete(dev.id)}
                        style={{padding:'4px 10px',fontSize:9,background:'#e5e8eb',color:'var(--cinza)',border:'none',
                          borderRadius:4,cursor:'pointer',transition:'.15s'}}
                        onMouseOver={e=>e.currentTarget.style.background='#d1d5db'}
                        onMouseOut={e=>e.currentTarget.style.background='#e5e8eb'}>Remover</button>
                    </div>
                  </div>
                  {dev.specs && Object.keys(dev.specs).length>0&&(
                    <div style={{fontSize:8,color:'var(--cinza)',display:'flex',gap:8,flexWrap:'wrap'}}>
                      {Object.entries(dev.specs).slice(0,3).map(([k,v])=>(
                        <span key={k}>{k}={v}</span>
                      ))}
                    </div>
                  )}
                </div>
              ))
            )}
          </div>

          <div style={{display:'flex',gap:8}}>
            <button className="mc-btn mc-btn-secondary" onClick={onClose}>Fechar</button>
            <button className="mc-btn mc-btn-primary" onClick={()=>{setStep(2);setEditingDevice(null);
              setFormState({category:'camera',baseDeviceType:'',brand:'',model:'',descricao:'',referencia:'',
                preco:'',specs:{},datasheetText:''});}}>+ Novo equipamento</button>
          </div>
        </div>
      </div>
    );
  }

  if(step===2){
    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:500}}>
          <h3>Novo Equipamento - Categoria</h3>
          <div style={{fontSize:11,color:'var(--cinza)',marginBottom:16}}>
            Selecione a categoria de equipamento
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
            {Object.entries(categoryLabels).map(([cat,label])=>(
              <button key={cat} onClick={()=>handleCategorySelect(cat)}
                style={{padding:12,border:'1px solid #d1d5db',background:'#f8f9fa',borderRadius:6,
                  fontSize:11,fontWeight:600,cursor:'pointer',transition:'.15s'}}
                onMouseOver={e=>e.currentTarget.style.background='#e5e8eb'}
                onMouseOut={e=>e.currentTarget.style.background='#f8f9fa'}>
                {label}
              </button>
            ))}
          </div>
          <button className="mc-btn mc-btn-secondary" onClick={()=>setStep(1)}>Voltar</button>
        </div>
      </div>
    );
  }

  if(step===3){
    const devices=DEVICE_LIB.flatMap(c=>c.items);
    const categoryPrefix=formState.category.substring(0,2);
    const filtered=devices.filter(d=>d.key.startsWith(categoryPrefix)||d.key.includes(formState.category));

    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:500}}>
          <h3>Novo Equipamento - Tipo Base</h3>
          <div style={{fontSize:11,color:'var(--cinza)',marginBottom:16}}>
            Selecione um tipo de dispositivo para herdar propriedades
          </div>
          <div style={{maxHeight:300,overflowY:'auto',marginBottom:16}}>
            {filtered.map(dev=>(
              <button key={dev.key} onClick={()=>handleBaseDeviceSelect(dev.key)}
                style={{display:'block',width:'100%',textAlign:'left',padding:10,marginBottom:6,
                  border:'1px solid #d1d5db',background:'#f8f9fa',borderRadius:6,fontSize:11,cursor:'pointer'}}
                onMouseOver={e=>e.currentTarget.style.background='#e5e8eb'}
                onMouseOut={e=>e.currentTarget.style.background='#f8f9fa'}>
                <div style={{fontWeight:600,color:'var(--azul)'}}>{dev.name}</div>
                <div style={{fontSize:9,color:'var(--cinza)',marginTop:2}}>{dev.key}</div>
              </button>
            ))}
          </div>
          <button className="mc-btn mc-btn-secondary" onClick={()=>setStep(2)}>Voltar</button>
        </div>
      </div>
    );
  }

  if(step===4 || step===5){
    const schema=EQUIPMENT_SCHEMAS[formState.category]||[];

    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-card" onClick={e=>e.stopPropagation()} style={{maxWidth:550}}>
          <h3>{editingDevice?'Editar':'Novo'} Equipamento - {step===4?'Dados Gerais':'Especificações'}</h3>

          <div style={{maxHeight:400,overflowY:'auto',marginBottom:16}}>
            {step===4?(
              <>
                <div className="cf-field" style={{marginBottom:12}}>
                  <label>Marca *</label>
                  <input value={formState.brand} onChange={e=>handleCommonFieldChange('brand',e.target.value)}/>
                </div>
                <div className="cf-field" style={{marginBottom:12}}>
                  <label>Modelo *</label>
                  <input value={formState.model} onChange={e=>handleCommonFieldChange('model',e.target.value)}/>
                </div>
                <div className="cf-field" style={{marginBottom:12}}>
                  <label>Descrição</label>
                  <textarea value={formState.descricao} onChange={e=>handleCommonFieldChange('descricao',e.target.value)}
                    style={{minHeight:60}}/>
                </div>
                <div className="cf-field" style={{marginBottom:12}}>
                  <label>Referência (SKU)</label>
                  <input value={formState.referencia} onChange={e=>handleCommonFieldChange('referencia',e.target.value)}/>
                </div>
                <div className="cf-field" style={{marginBottom:12}}>
                  <label>Preço (R$)</label>
                  <input value={formState.preco} onChange={e=>handleCommonFieldChange('preco',e.target.value)} type="number"/>
                </div>
                <div className="cf-field">
                  <label>Datasheet (colar texto)</label>
                  <textarea value={formState.datasheetText} onChange={e=>handleCommonFieldChange('datasheetText',e.target.value)}
                    style={{minHeight:80,fontSize:9}}
                    placeholder="Cole aqui o texto do datasheet para extração automática de especificações"/>
                  <button onClick={parseDatasheet}
                    style={{marginTop:6,padding:'6px 12px',fontSize:9,background:'var(--azul2)',color:'#fff',
                      border:'none',borderRadius:4,cursor:'pointer'}}>
                    🔍 Extrair especificações
                  </button>
                </div>
              </>
            ):(
              <>
                {schema.map(field=>(
                  <div key={field.key} className="cf-field" style={{marginBottom:12}}>
                    <label>{field.label}{field.required?' *':''}</label>
                    {field.type==='text'&&(
                      <input value={formState.specs[field.key]||''}
                        onChange={e=>handleSpecChange(field.key,e.target.value)}
                        placeholder={field.unit?'Ex: 12 '+field.unit:''}/>
                    )}
                    {field.type==='number'&&(
                      <input value={formState.specs[field.key]||''}
                        onChange={e=>handleSpecChange(field.key,e.target.value)}
                        type="number" placeholder={field.unit?'0 '+field.unit:'0'}/>
                    )}
                    {field.type==='select'&&(
                      <select value={formState.specs[field.key]||''}
                        onChange={e=>handleSpecChange(field.key,e.target.value)}>
                        <option value="">Selecionar...</option>
                        {field.options.map(opt=>(
                          <option key={opt} value={opt}>{opt}</option>
                        ))}
                      </select>
                    )}
                    {field.type==='bool'&&(
                      <label style={{display:'flex',alignItems:'center',gap:6}}>
                        <input type="checkbox" checked={!!formState.specs[field.key]}
                          onChange={e=>handleSpecChange(field.key,e.target.checked)}/>
                        <span style={{fontSize:11}}>{field.label}</span>
                      </label>
                    )}
                  </div>
                ))}
              </>
            )}
          </div>

          <div style={{display:'flex',gap:8}}>
            <button className="mc-btn mc-btn-secondary" onClick={()=>setStep(step===4?2:4)} style={{flex:1}}>
              Voltar
            </button>
            {step===4&&(
              <button className="mc-btn mc-btn-primary" onClick={()=>setStep(5)}>
                Próximo
              </button>
            )}
            {step===5&&(
              <button className="mc-btn mc-btn-primary" onClick={handleSave}>
                {editingDevice?'Atualizar':'Criar'} Equipamento
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }
}
